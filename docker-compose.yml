version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vagus
      POSTGRES_PASSWORD: vagus_dev
      POSTGRES_DB: vagus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
